# ============================================================================
# Universal Data Validation Framework — Complete Examples Reference
# ============================================================================
# This file demonstrates EVERY scenario the tool supports.
# Copy the validation blocks you need into your own config YAML.
#
# Adapter types:   file | table | datasource
# File formats:    CSV, JSON, Parquet, Excel (.xlsx / .xls)
# Table backend:   Amazon Redshift (multi-environment)
# Datasource:      Tableau Packaged Workbook (.twbx)
# ============================================================================


# ────────────────────────────────────────────────────────────────────────────
# SECTION 1 — The 5 Core Comparison Scenarios
# ────────────────────────────────────────────────────────────────────────────

validations:

  # ── 1. File → Redshift Table (ETL pipeline validation) ──────────────────
  - name: "CSV to Redshift Table"
    regression: false 
    source:
      type: file
      path: ./data/SF_profile.csv
    target:
      type: table
      environment: DEV          # Reads DEV_JDBC_URL, DEV_USER, DEV_PASSWORD from .env
      schema: edw_asis
      table: salesforce_profile
    primary_keys: id
    output_dir: ./results

  # ── 2. Redshift Table → Redshift Table (cross-schema) ──────────────────
  - name: "ASIS vs TOBE Schema"
    source:
      type: table
      environment: DEV
      schema: edw_asis
      table: customers
    target:
      type: table
      environment: DEV
      schema: edw_tobe
      table: customers
    primary_keys: customer_id
    output_dir: ./results

  # ── 3. File → File (format migration / export check) ───────────────────
  - name: "CSV to Parquet"
    source:
      type: file
      path: ./data/source.csv
    target:
      type: file
      path: ./data/target.parquet
    primary_keys: id
    output_dir: ./results

  # ── 4. Tableau Datasource → Datasource (pre/post-RCA) ─────────────────
  - name: "TWBX Pre vs Post RCA"
    source:
      type: datasource
      path: ./datasources/pre_rca_opp_historical.twbx
    target:
      type: datasource
      path: ./datasources/post_rca_opp_historical.twbx
    output_dir: ./results

  # ── 5. Tableau Datasource → Redshift Table (dashboard accuracy) ────────
  - name: "TWBX to Redshift"
    source:
      type: datasource
      path: ./datasources/my_datasource.twbx
      datasource_name: "Main Data"  # Optional: pick a specific datasource inside the TWBX
    target:
      type: table
      environment: PREPROD
      schema: edw_asis
      table: tableau_data
    primary_keys: record_id
    output_dir: ./results


# ────────────────────────────────────────────────────────────────────────────
# SECTION 2 — Multi-Environment Scenarios
# ────────────────────────────────────────────────────────────────────────────
# Environments are defined in your .env file:
#   DEV_JDBC_URL, DEV_USER, DEV_PASSWORD, DEV_SCHEMA
#   PREPROD_JDBC_URL, PREPROD_USER, PREPROD_PASSWORD
#   PROD_JDBC_URL, PROD_USER, PROD_PASSWORD
#   DEV_REVOPS_JDBC_URL, DEV_REVOPS_USER, DEV_REVOPS_PASSWORD
# ────────────────────────────────────────────────────────────────────────────

  # ── 6. DEV → PREPROD (migration validation, active rows only) ─────────
  - name: "DEV to PREPROD Migration (Active Only)"
    source:
      type: table
      environment: DEV
      schema: staging
      table: customers
      where_clause: "edw_act_fl = 'Y'"
    target:
      type: table
      environment: PREPROD
      schema: staging
      table: customers
      where_clause: "edw_act_fl = 'Y'"
    primary_keys: customer_id
    output_dir: ./results

  # ── 7. PREPROD → PROD (pre-deploy sanity check) ────────────────────────
  - name: "PREPROD to PROD Validation"
    source:
      type: table
      environment: PREPROD
      schema: production
      table: final_data
    target:
      type: table
      environment: PROD
      schema: production
      table: final_data
    primary_keys: record_id
    output_dir: ./results

  # ── 8. Same cluster, different users (DEV vs DEV_REVOPS) ───────────────
  - name: "DEV vs DEV RevOps User"
    source:
      type: table
      environment: DEV            # kkrishna user
      schema: edw_asis
      table: opportunity
    target:
      type: table
      environment: DEV_REVOPS     # revops_test_qa user
      schema: edw_asis
      table: opportunity
    primary_keys: opportunity_id
    output_dir: ./results

  # ── 9. File → PROD table (production upload validation) ────────────────
  - name: "CSV Upload to PROD"
    source:
      type: file
      path: ./data/production_upload.csv
    target:
      type: table
      environment: PROD
      schema: production
      table: import_table
    primary_keys: transaction_id
    output_dir: ./results

  # ── 10. Mixed: environment + legacy direct config ──────────────────────
  - name: "Environment vs Direct Config"
    source:
      type: table
      environment: DEV
      schema: edw_asis
      table: source_data
    target:
      type: table
      # Legacy direct connection (no environment variable)
      host: custom-cluster.region.redshift.amazonaws.com
      database: custom_db
      user: custom_user
      password: custom_pass
      port: 5439
      schema: public
      table: target_data
    primary_keys: id
    output_dir: ./results


# ────────────────────────────────────────────────────────────────────────────
# SECTION 3 — File Format Variations
# ────────────────────────────────────────────────────────────────────────────

  # ── 11. CSV with custom separator (TSV / pipe-delimited) ───────────────
  - name: "TSV File to Table"
    source:
      type: file
      path: ./data/export.tsv
      sep: "\t"                   # Tab-separated
    target:
      type: table
      environment: DEV
      schema: staging
      table: tsv_import
    primary_keys: id
    output_dir: ./results

  # ── 12. Pipe-delimited file ────────────────────────────────────────────
  - name: "Pipe-Delimited to CSV"
    source:
      type: file
      path: ./data/legacy_export.txt
      sep: "|"
      format: csv                 # Force CSV parser on .txt file
    target:
      type: file
      path: ./data/modern_export.csv
    primary_keys: record_id
    output_dir: ./results

  # ── 13. CSV with explicit encoding ────────────────────────────────────
  - name: "Latin-1 Encoded CSV"
    source:
      type: file
      path: ./data/european_data.csv
      encoding: iso-8859-1
    target:
      type: table
      environment: DEV
      schema: staging
      table: european_data
    primary_keys: id
    output_dir: ./results

  # ── 14. JSON file (records orientation) ────────────────────────────────
  - name: "JSON API Response to Table"
    source:
      type: file
      path: ./data/api_response.json
      json_orient: records        # Options: records, index, columns, values
    target:
      type: table
      environment: DEV
      schema: staging
      table: api_data
    primary_keys: request_id
    output_dir: ./results

  # ── 15. JSON to CSV ───────────────────────────────────────────────────
  - name: "JSON to CSV Comparison"
    source:
      type: file
      path: ./data/payload.json
      json_orient: records
    target:
      type: file
      path: ./data/payload_export.csv
    primary_keys: id
    output_dir: ./results

  # ── 16. Parquet to Redshift ────────────────────────────────────────────
  - name: "Parquet to Redshift"
    source:
      type: file
      path: ./data/warehouse_extract.parquet
    target:
      type: table
      environment: PREPROD
      schema: edw_asis
      table: warehouse_data
    primary_keys: warehouse_id,product_id
    output_dir: ./results

  # ── 17. Excel (specific sheet) to CSV ──────────────────────────────────
  - name: "Excel Sheet to CSV"
    source:
      type: file
      path: ./data/finance_report.xlsx
      sheet_name: "Q4 Summary"    # By name (or use 0, 1, 2 for index)
    target:
      type: file
      path: ./data/q4_summary.csv
    primary_keys: account_id
    output_dir: ./results

  # ── 18. Excel to Redshift table ───────────────────────────────────────
  - name: "Excel to Redshift"
    source:
      type: file
      path: ./data/manual_upload.xlsx
      sheet_name: 0               # First sheet
    target:
      type: table
      environment: DEV
      schema: staging
      table: manual_data
    primary_keys: id
    output_dir: ./results

  # ── 19. Parquet to Parquet ────────────────────────────────────────────
  - name: "Parquet v1 vs v2"
    source:
      type: file
      path: ./data/batch_v1.parquet
    target:
      type: file
      path: ./data/batch_v2.parquet
    primary_keys: batch_id,line_number
    output_dir: ./results


# ────────────────────────────────────────────────────────────────────────────
# SECTION 4 — Primary Key Variations
# ────────────────────────────────────────────────────────────────────────────

  # ── 20. Composite primary key ─────────────────────────────────────────
  - name: "Composite PK Validation"
    source:
      type: file
      path: ./data/orders.csv
    target:
      type: table
      environment: DEV
      schema: edw_asis
      table: orders
    primary_keys: order_id,line_item_id,timestamp    # 3-column composite key
    output_dir: ./results

  # ── 21. No primary key (row-by-row positional comparison) ──────────────
  - name: "Row-by-Row Comparison (No PK)"
    source:
      type: file
      path: ./data/batch_data.parquet
    target:
      type: table
      environment: DEV
      schema: staging
      table: batch_import
    # primary_keys omitted → row-by-row comparison
    output_dir: ./results


# ────────────────────────────────────────────────────────────────────────────
# SECTION 5 — Selective Column Validation
# ────────────────────────────────────────────────────────────────────────────

  # ── 22. Load only specific columns from Redshift ──────────────────────
  - name: "Selective Column Validation"
    source:
      type: file
      path: ./data/crm_extract.csv
    target:
      type: table
      environment: DEV
      schema: edw_asis
      table: crm_accounts
      columns:                    # Only fetch these columns from Redshift
        - account_id
        - account_name
        - owner_email
        - annual_revenue
    primary_keys: account_id
    output_dir: ./results


# ────────────────────────────────────────────────────────────────────────────
# SECTION 6 — Tableau Datasource Scenarios
# ────────────────────────────────────────────────────────────────────────────

  # ── 23. TWBX with named datasource ────────────────────────────────────
  - name: "Specific Datasource in TWBX"
    source:
      type: datasource
      path: ./datasources/multi_ds_workbook.twbx
      datasource_name: "Opportunity Pipeline"   # Pick one datasource from the workbook
    target:
      type: datasource
      path: ./datasources/multi_ds_workbook_v2.twbx
      datasource_name: "Opportunity Pipeline"
    output_dir: ./results

  # ── 24. TWBX to CSV (extract and compare) ─────────────────────────────
  - name: "TWBX Metadata vs CSV Export"
    source:
      type: datasource
      path: ./datasources/dashboard.twbx
    target:
      type: file
      path: ./data/tableau_column_export.csv
    output_dir: ./results


# ────────────────────────────────────────────────────────────────────────────
# SECTION 7 — Running Multiple Validations Together
# ────────────────────────────────────────────────────────────────────────────
# When this config has multiple entries, the framework automatically:
#   • Generates individual CSV + HTML reports per validation
#   • Creates a consolidated Excel workbook (one sheet per validation + summary)
#   • Creates a single tabbed HTML report covering all validations
#   • Archives individual reports into results/archive/
#
# Run all:   python3 cli.py validate --config config/multi_env_examples.yaml
# Run one:   python3 cli.py validate --config config/multi_env_examples.yaml --name "CSV to Redshift Table"
# Debug:     python3 cli.py validate --config config/multi_env_examples.yaml --debug
# ────────────────────────────────────────────────────────────────────────────
